name: Get My Books
on: workflow_dispatch

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Files
        run: |
          mkdir -p raw_books
          # روابط من مستودع بديل مستقر جداً
          curl -L "https://raw.githubusercontent.com/the-islamic-db/arabic-books-archive/master/Ulum_Quran/Al_Burhan_Zarkashi.txt" -o "raw_books/البرهان_للزركشي.txt"
          curl -L "https://raw.githubusercontent.com/the-islamic-db/arabic-books-archive/master/Ulum_Quran/Al_Itqan_Suyuti.txt" -o "raw_books/الإتقان_للسيوطي.txt"
          curl -L "https://raw.githubusercontent.com/the-islamic-db/arabic-books-archive/master/Ulum_Quran/Al_Muqni_Dani.txt" -o "raw_books/المقنع_للداني.txt"
          curl -L "https://raw.githubusercontent.com/the-islamic-db/arabic-books-archive/master/Ulum_Quran/Samir_Al_Talibin.txt" -o "raw_books/سمير_الطالبين.txt"
          curl -L "https://raw.githubusercontent.com/the-islamic-db/arabic-books-archive/master/Ulum_Quran/Tarikh_Al_Mushaf.txt" -o "raw_books/تاريخ_المصحف.txt"
      - name: Push to Repo
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add raw_books/
          git commit --allow-empty -m "تحديث الكتب بروابط مستقرة"
          git push
